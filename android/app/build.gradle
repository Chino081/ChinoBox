plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.chino.chinobox"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        applicationId = "com.chino.chinobox"
        minSdkVersion = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    splits {
        abi {
            enable true
            reset()
            include "arm64-v8a", "x86_64"
            universalApk true
        }
    }

    packaging {
        resources {
            excludes += ["META-INF/beans.xml"]
        }
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.debug
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }
}

flutter {
    source = "../.."
}

repositories {
    flatDir { dirs 'libs' }
}

dependencies {
    // Cling UPnP
    implementation 'org.fourthline.cling:cling-core:2.1.1'
    implementation 'org.fourthline.cling:cling-support:2.1.1'
    // NanoHTTPD for local media server
    implementation files('libs/nanohttpd-2.3.1.jar')
    // DLNA AAR modules
    implementation(name: 'core-2.0.0-SNAPSHOT', ext: 'aar')
    implementation(name: 'dmc-2.0.0-SNAPSHOT', ext: 'aar')
    implementation(name: 'dmr-2.0.0-SNAPSHOT', ext: 'aar')
    implementation(name: 'dms-2.0.0-SNAPSHOT', ext: 'aar')
}
