name: chinobox
description: A Flutter/Dart app for Android and Windows.
publish_to: "none"
version: 1.0.5+4

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  crypto: ^3.0.7
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  html: ^0.15.5
  media_kit: ^1.1.11
  media_kit_video: ^1.2.5
  media_kit_libs_android_video: ^1.3.7
  media_kit_libs_windows_video: ^1.0.11
  pointycastle: ^4.0.0
  shared_preferences: ^2.3.4
  url_launcher: ^6.3.1
  cached_network_image: ^3.3.1
  xml: ^6.5.0
  path_provider: ^2.1.2
  window_manager: ^0.5.1
dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
